body:
  text: 其形如蛇作雷電之勢身金色繫如意寶三昧焰起四足蹴踏之形背張竪七金剛利針額生一支玉角纏繞劍上畫阿字兼用觀心一一分明若作人相者面目喜怒遍身甲胄猶如毗嚕博叉王左托腰把索右臂屈肘向上執劍頂上置龍王蟠立金剛山別本云迦里龍王如天神熙怡之相頭上畫出七頭龍胡跪仰視如來合捧寶蓮華阿字變成此龍使者此字是重菩提種子凡持誦者皆有此心希求無上菩提故劍上觀此字從此生一切法也即菩提心也行點者成就福智故大空者是成菩提也涅槃點者是除遣義諸垢入涅槃也重字猶如大龍王有大威德興雲致雨一切自在故阿字亦復如是如來作事皆從此字出生次龍王法身印真言左右無名小指掌內相叉二中指直竪相拄以二食指拄中指背上節以二大指少曲各拄二食指內中節頭來去在肘樣如後真言曰曩莫三漫多勃馱喃唵一布祇二步醯布伽跛底吽莎訶上音四一切龍王法身印以右羽頭在左內以右後四指少曲母指博頭指少曲之左手返曲向右手上亦如是兩手相向狀如蛇口以二手四指開令來去真言如前次華座印二手八指似曲不曲皆向上竪二小指相去二寸二無二中各相去二寸二頭指去四寸並竪大指二指相著次牙印屈右肘向上屈無名小指在掌中指直竪屈頭指側著中指節以大指捻頭指側若作壇供養時節作此印誦真言用前喚入壇中即得一切皆悉歡喜若欲祈雨當具作壇供養即得降雨三五七八九一寸等云云法具在別文次根本真言曰曩莫三滿多勃馱喃俱迦耶迦囉若銘伽扇儞曳娑嚩二合訶用前印若有病患者當結龍王身印加持即執劍上上運心觀想婀字變成金色龍忿怒光曜之貌令觀病人即得除差若有蘖㗚訶魅魂之著誐㗚行疫病鬼之持位在南方及瘧病種種苦惱事當作一肘水壇四角置瓶口插生華用綵華亦得四方置四器盛滿香水諸供具物布列莊嚴即勸請龍王安住壇上壇中方置劍啓白事由禮拜供養誦真言加持百八遍執刀加被病人即得消滅即發遣誦破壇明次觀風輪破壇了不獲令久住是法祕中祕也莫專輒傳俱哩迦龍者諸龍之中王具出文殊師利法等
